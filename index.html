<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <h2>Registro de Usuario</h2>
      <form id="RegistroForm">
        <input type="text" id="Usuario" placeholder="Usuario" required />
        <input
          type="password"
          id="password"
          placeholder="contraseña"
          required
        />
        <button type="submit">Registrarse</button>
      </form>
      <p id="Mensaje"></p>
    </div>

    <h1>Formulario de Inscripción</h1>

    <form>
      <div>
        <p>Título</p>
        <input type="radio" name="title" id="mr" />
        <label for="mr">Mr</label>
        <input type="radio" name="title" id="mrs" />
        <label for="mrs">Mrs</label>
        <input type="radio" name="title" id="miss" />
        <label for="miss">Miss</label>
      </div>

      <br />

      <div>
        <label for="PrimerNombre">Primer nombre</label>
        <br />
        <input type="text" id="PrimerNombre" placeholder="Arturo..." />
      </div>

      <br />

      <div>
        <label for="Apellido">Apellido</label>
        <br />
        <input type="text" id="Apellido" placeholder="Rangel..." />
      </div>

      <br />

      <div>
        <label for="Correo">Correo</label>
        <br />
        <input type="email" id="Correo" placeholder="@gmail..." />
      </div>

      <br />

      <div>
        <label for="Numero">Número de telefono</label>
        <br />
        <input type="number" id="Numero" placeholder="+52 ..." />
      </div>

      <br />

      <div>
        <label for="password">Contraseña</label>
        <br />
        <input type="password" id="password" placeholder="***" />
      </div>

      <br />

      <div>
        <label for="Pais">Selecciona tu país</label>
        <br />
        <select name="Pais" id="Pais">
          <option value="Mexico">México</option>
          <option value="Brasil">Brasil</option>
          <option value="Colombia">Colombia</option>
          <option value="Chile">Chile</option>
        </select>
      </div>

      <br />

      <div>
        <label for="cv">Tu Curricuum Vitae (CV)</label>
        <br>
        <input type="file" name="cv" id="cv">
      </div>

      <br>

      <div>
        <input type="checkbox" name="checkbox" id="terms" />
        <label for="terms"
          >Estoy de acuerdo con los términos y condiciones</label
        >
      </div>

      <br />

      <div>
        <label for="mensaje">Escribe un comentario</label>
        <br /><br />
        <textarea
          name="mensaje"
          id="mensaje"
          cols="30"
          rows="10"
          placeholder="Escribe un mensaje"
        ></textarea>
      </div>

      <br />

      <div>
        <button type="submit">Registrarse</button>
        <button type="reset">Borrar formulario</button>
      </div>
    </form>
  </body>
</html>
